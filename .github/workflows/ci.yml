# pytest（プッシュ / PR）。リポジトリを GitHub に置いたときに自動で回る。
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (editable) + dev deps
        run: pip install -e ".[dev]"

      - name: Pytest
        run: python -m pytest basketball_sim/tests -q

      - name: CLI smoke (non-interactive)
        run: python -m basketball_sim.main --smoke
