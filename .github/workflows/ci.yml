# pytest（プッシュ / PR）。リポジトリを GitHub に置いたときに自動で回る。
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (editable) + dev deps
        run: pip install -e ".[dev]"

      - name: Pytest
        run: python -m pytest basketball_sim/tests -q

      - name: CLI smoke (non-interactive)
        run: python -m basketball_sim.main --smoke

  build_exe_windows:
    name: Build Windows exe (PyInstaller) + smoke + artifact
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install -e ".[build]"

      - name: Build exe (PyInstaller)
        run: python -m PyInstaller --noconfirm BasketballGM.spec

      - name: EXE smoke (non-interactive)
        run: .\dist\BasketballGM.exe --smoke

      - name: Write SHA256 (BasketballGM.exe)
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 .\dist\BasketballGM.exe).Hash.ToLower()
          "$hash  BasketballGM.exe" | Out-File -Encoding ascii .\dist\BasketballGM.exe.sha256.txt

      - name: Write job summary (SHA256)
        shell: pwsh
        run: |
          $line = Get-Content .\dist\BasketballGM.exe.sha256.txt
          "## BasketballGM-windows-exe" | Out-File -Encoding utf8 $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -Encoding utf8 $env:GITHUB_STEP_SUMMARY -Append
          "SHA256:" | Out-File -Encoding utf8 $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File -Encoding utf8 $env:GITHUB_STEP_SUMMARY -Append
          "``````" | Out-File -Encoding utf8 $env:GITHUB_STEP_SUMMARY -Append
          $line | Out-File -Encoding utf8 $env:GITHUB_STEP_SUMMARY -Append
          "``````" | Out-File -Encoding utf8 $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload artifact (BasketballGM.exe)
        uses: actions/upload-artifact@v4
        with:
          name: BasketballGM-windows-exe
          path: |
            dist/BasketballGM.exe
            dist/BasketballGM.exe.sha256.txt
          if-no-files-found: error
          retention-days: 14
